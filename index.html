<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เบิกใบผาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fd;
            --primary-text: #4a4a4a;
            --secondary-text: #9b9b9b;
            --pastel-blue: #e1f5fe;
            --card-white: #ffffff;
            --shadow: 0 12px 30px rgba(0, 0, 0, 0.04);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 24px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container {
            width: 60px;
            height: 60px;
            background: var(--pastel-blue);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: var(--shadow);
            font-size: 1.5rem;
        }

        .card {
            background: var(--card-white);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e5e5;
            border-radius: 14px;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
        }

        .back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: white;
            color: var(--primary-text);
            border-radius: 16px;
            text-decoration: none;
            box-shadow: var(--shadow);
        }

        .submit-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: #4fc3f7;
            color: white;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="logo-container">💿</div>
            <h1>เบิกใบผาน</h1>
            <p>รายละเอียดและแบบฟอร์มการเบิก</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label>ชื่อผู้เบิก</label>
                <input type="text" placeholder="กรอกชื่อผู้เบิก">
            </div>

            <div class="form-group">
                <label>แผนก</label>
                <input type="text" placeholder="กรอกแผนก">
            </div>

            <div class="form-group">
                <label>รายการวัสดุ</label>
                <input type="text" value="ใบผาน">
            </div>

            <div class="form-group">
                <label>จำนวน</label>
                <input type="number" placeholder="กรอกจำนวน">
            </div>

            <div class="form-group">
                <label>หมายเหตุ</label>
                <textarea rows="4" placeholder="รายละเอียดเพิ่มเติม"></textarea>
            </div>

            <button class="submit-button">บันทึกรายการเบิก</button>
        </div>

        <a href="index.html" class="back-button">← กลับหน้าหลัก</a>
    </div>
</body>
</html>
