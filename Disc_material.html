<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบติดตามรายการใบเบิก - ใบผาน</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f1f5f9;
        }

        .table-container {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* 🔥 ปรับให้พอดีจอ */
        table {
            table-layout: fixed;
            width: 100%;
        }

        th, td {
            padding: 14px 12px !important;
        }

        th {
            font-size: 11px;
        }

        td {
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .wo-badge {
            font-family: monospace;
            background: #eef2ff;
            color: #4338ca;
            padding: 0.35rem 0.7rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 0.9rem;
            border: 1px solid #c7d2fe;
        }

        .model-text {
            font-size: 1.05rem;
            font-weight: 800;
        }

        .plan-name {
            font-size: 0.75rem;
            color: #64748b;
        }

        .rm-text {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .qty-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .date-box {
            min-width: 90px;
            font-size: 0.75rem;
            background: #fff7ed;
            border: 1px solid #ffedd5;
            border-radius: 0.75rem;
            padding: 6px;
        }

        .date-box-green {
            background: #ecfdf5;
            border: 1px solid #bbf7d0;
            color: #047857;
        }

        .status-pill {
            font-size: 0.7rem;
            padding: 0.3rem 0.6rem;
            border-radius: 999px;
            font-weight: 700;
        }

        .status-pending {
            background: #fff7ed;
            color: #c2410c;
        }

        .status-complete {
            background: #dcfce7;
            color: #047857;
        }

        .remark-box {
            font-size: 0.75rem;
            min-width: 140px;
            max-width: 200px;
        }

        .inv-badge {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4338ca;
        }

    </style>
</head>

<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto">

    <h1 class="text-2xl font-bold mb-6">รายการใบเบิกประจำวัน - ใบผาน</h1>

    <div class="table-container">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-50 text-slate-500 uppercase">
                        <th>วันที่</th>
                        <th>MODEL</th>
                        <th>WO</th>
                        <th>RM</th>
                        <th>QTY</th>
                        <th>สถานะ</th>
                        <th>วันที่เบิก</th>
                        <th>INV</th>
                    </tr>
                </thead>

                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>

const WEB_APP_URL = "PUT_YOUR_URL_HERE";

function getStatusText(item) {
    if (item.Remark_05) return 'เบิกแล้ว';
    return 'รอเบิก';
}

function getStatusClass(status) {
    return status === 'เบิกแล้ว' ? 'status-complete' : 'status-pending';
}

function buildRow(item) {

    const status = getStatusText(item);

    return `
    <tr>

        <td>
            <div class="date-box">
                ${item['วันที่กำหนดใช้ของ'] || '-'}
            </div>
        </td>

        <td>
            <div class="model-text">${item['Model No'] || '-'}</div>
            <div class="plan-name">${item['แผนผลิตประจำเดือน ID'] || '-'}</div>
        </td>

        <td>
            <div class="wo-badge">${item['รายการผลิต ID'] || '-'}</div>
        </td>

        <td>
            <div class="rm-text">${item['RM No'] || '-'}</div>
        </td>

        <td>
            <div class="qty-circle">${item.QTY || 0}</div>
        </td>

        <td>
            <span class="status-pill ${getStatusClass(status)}">
                ${status}
            </span>
        </td>

        <td>
            ${
                status === 'เบิกแล้ว'
                ? `<div class="date-box-green">${item['Remark_05']}</div>`
                : '-'
            }
        </td>

        <td>
            ${
                status === 'เบิกแล้ว'
                ? `<span class="inv-badge">${item['INV'] || '-'}</span>`
                : '-'
            }
        </td>

    </tr>
    `;
}

async function loadData() {

    const res = await fetch(WEB_APP_URL);
    const data = await res.json();

    const rows = data.rows || data;

    const table = document.getElementById('tableBody');
    table.innerHTML = '';

    rows.forEach(item => {
        table.insertAdjacentHTML('beforeend', buildRow(item));
    });

}

loadData();

</script>

</body>
</html>
