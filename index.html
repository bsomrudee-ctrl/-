<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเบิกวัสดุอุปกรณ์</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f8f9fd;
            --primary-text: #4a4a4a;
            --secondary-text: #9b9b9b;
            --pastel-blue: #e1f5fe;
            --pastel-orange: #fff8e1;
            --card-white: #ffffff;
            --shadow: 0 12px 30px rgba(0, 0, 0, 0.04);
            --accent-blue: #4fc3f7;
            --accent-orange: #ffd54f;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 🔥 แก้ให้ไม่บีบกลางจอ */
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px; /* 🔥 ขยายเต็ม */
            padding: 24px;
            text-align: center;
        }

        .header-section {
            margin-bottom: 40px;
        }

        .logo-container {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: var(--shadow);
            font-size: 1.5rem;
        }

        .header-section h1 {
            font-weight: 500;
            font-size: 1.6rem;
            margin: 0;
            color: #333;
        }

        .header-section p {
            font-size: 0.9rem;
            color: var(--secondary-text);
            margin-top: 8px;
        }

        .menu-grid {
            display: grid;
            gap: 20px;
        }

        .menu-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            border-radius: 32px;
            background: var(--card-white);
            box-shadow: var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: translateY(-5px);
        }

        .icon-wrapper {
            width: 100px;
            height: 100px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        .card-disc .icon-wrapper {
            background-color: var(--pastel-blue);
        }

        .card-dozer .icon-wrapper {
            background-color: var(--pastel-orange);
        }

        .menu-title {
            font-size: 1.4rem;
        }

        .menu-subtitle {
            font-size: 0.85rem;
            color: var(--secondary-text);
        }

        .page {
            display: none;
            width: 100%; /* 🔥 สำคัญ */
        }

        .page.active {
            display: block;
        }

        .embed-card {
            background: white;
            padding: 16px;
            border-radius: 32px;
            box-shadow: var(--shadow);
        }

        .embed-frame {
            width: 100%;
            height: 85vh; /* 🔥 เต็มจอ */
            border: none;
            border-radius: 20px;
        }

        .back-button {
            margin-top: 20px;
            padding: 12px 20px;
            border-radius: 20px;
            border: none;
            background: white;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: #d1d1d1;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- หน้าเมนู -->
    <div id="dashboard-page" class="page active">

        <div class="header-section">
            <div class="logo-container">📋</div>
            <h1>รายการเบิกวัสดุ</h1>
            <p>ระบบจัดการสต็อกอะไหล่เครื่องจักร</p>
        </div>

        <div class="menu-grid">

            <div onclick="showPage('disc-page')" class="menu-card card-disc">
                <div class="icon-wrapper">💿</div>
                <div class="menu-title">ใบผาน</div>
                <div class="menu-subtitle">ชุดใบผานพรวน</div>
            </div>

            <div onclick="showPage('dozer-page')" class="menu-card card-dozer">
                <div class="icon-wrapper">🚜</div>
                <div class="menu-title">ใบดันดิน</div>
                <div class="menu-subtitle">ชุดใบดันหน้า</div>
            </div>

        </div>

    </div>

    <!-- หน้า Disc -->
    <div id="disc-page" class="page">

        <div class="header-section">
            <div class="logo-container" style="background: var(--pastel-blue)">💿</div>
            <h1>เบิกใบผาน</h1>
        </div>

        <div class="embed-card">
            <iframe src="Disc_material.html" class="embed-frame"></iframe>
        </div>

        <button onclick="showPage('dashboard-page')" class="back-button">
            ← กลับหน้าหลัก
        </button>

    </div>

    <!-- หน้า Dozer -->
    <div id="dozer-page" class="page">

        <div class="header-section">
            <div class="logo-container" style="background: var(--pastel-orange)">🚜</div>
            <h1>เบิกใบดันดิน</h1>
        </div>

        <div class="embed-card">
            <iframe src="Dozer_material.html" class="embed-frame"></iframe>
        </div>

        <button onclick="showPage('dashboard-page')" class="back-button">
            ← กลับหน้าหลัก
        </button>

    </div>

    <div class="footer">
        Digital Warehouse System
    </div>

</div>

<script>
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}
</script>

</body>
</html>
